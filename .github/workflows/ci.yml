name: CPS CI Pipeline

on:
 push:
   branches: [ master ]
 pull_request:
   branches: [ master ]

jobs:
 build-and-test:
   runs-on: ubuntu-22.04

   steps:
     - name: Checkout code
       uses: actions/checkout@v4

     - name: Build Docker image
       run: docker build -t cps-test-image .

     - name: Run tests inside container
       run: |
         mkdir -p output
         docker run --rm \
           -v ${{ github.workspace }}/output:/app/output \
           cps-test-image

     - name: Upload Test Report
       uses: actions/upload-artifact@v4
       with:
         name: test-report
         path: report.html
